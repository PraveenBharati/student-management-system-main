apiVersion: v1
kind: Secret
metadata:
  name: student-app-secret
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "student-management.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Pass real values at deploy time:
  # helm upgrade ... --set secret.dbUsername=root --set secret.dbPassword=<real>
  DB_USERNAME: {{ .Values.secret.dbUsername | quote }}
  DB_PASSWORD: {{ .Values.secret.dbPassword | quote }}
