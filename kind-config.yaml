kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: student-cluster
nodes:
  - role: control-plane
    extraPortMappings:
      # This maps EC2 port 30080 so NodePort service is reachable externally
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # ArgoCD UI port
      - containerPort: 30081
        hostPort: 30081
        protocol: TCP
