apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
  namespace: student-app
  labels:
    app: student-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: student-app
    spec:
      # Pull image from AWS ECR using the secret
      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: student-app
          # Jenkins will update this image tag automatically
          image: 730335657713.dkr.ecr.us-east-1.amazonaws.com/student-management:7
          ports:
            - containerPort: 8080

          # Inject DB credentials from Secret and config from ConfigMap
          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: student-app-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: student-app-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: student-app-secret
                  key: DB_PASSWORD

          # Resource limits - important for t2.medium
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Liveness probe - Kubernetes restarts pod if this fails
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe - pod only receives traffic when this passes
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: student-service
  namespace: student-app
spec:
  type: NodePort
  selector:
    app: student-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080   # Access via http://<EC2-public-ip>:30080
