apiVersion: v1
kind: Secret
metadata:
  name: student-app-secret
  namespace: student-app
type: Opaque
stringData:
  # These values will be replaced with real values before applying
  DB_USERNAME: root
  DB_PASSWORD: Admin@123
---
# Secret for pulling images from AWS ECR
# You will create this using kubectl command - see README
# kubectl create secret docker-registry ecr-secret \
#   --docker-server=<aws-account-id>.dkr.ecr.us-east-1.amazonaws.com \
#   --docker-username=AWS \
#   --docker-password=$(aws ecr get-login-password --region us-east-1) \
#   --namespace=student-app
